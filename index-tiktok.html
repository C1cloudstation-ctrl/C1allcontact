<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C1 Cloud Station - TikTok</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0f2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #111635;
            border: 2px solid #c9a406;
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 420px;
            width: 100%;
            text-align: center;
        }

        .logo {
            font-size: 48px;
            font-weight: 800;
            color: #ffd700;
            letter-spacing: 4px;
            margin-bottom: 5px;
        }

        .sub-title {
            color: #6b7ab8;
            font-size: 14px;
            margin-bottom: 35px;
            letter-spacing: 2px;
        }

        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #c9a406, transparent);
            margin: 0 auto 30px;
        }

        .tiktok-badge {
            background: #000;
            border: 1px solid #333;
            border-radius: 20px;
            padding: 6px 16px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #fff;
            font-size: 13px;
            margin-bottom: 30px;
        }

        .btn-discord {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 16px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1.5px solid transparent;
            background: #5865f2;
            color: #fff;
            border-color: #5865f2;
        }

        .btn-discord:hover {
            background: #4752c4;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .icon {
            font-size: 20px;
            width: 24px;
            text-align: center;
        }

        .footer {
            margin-top: 30px;
            color: #4a5580;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">C1</div>
        <div class="sub-title">CLOUD STATION · ร้านเช่าคอม</div>
        <div class="divider"></div>

        <div class="tiktok-badge">
            <span>🎵</span> มาจาก TikTok
        </div>

        <a href="https://discord.gg/VYDxM7m2x3" target="_blank" class="btn-discord">
            <span class="icon">💬</span> เข้าร่วม Discord
        </a>

        <div class="footer">
            © 2026 C1 Cloud Station
        </div>
    </div>
</body>
</html>
